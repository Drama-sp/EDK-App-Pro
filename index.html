<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDK App Pro - Comunidad EDKSTUDIOS</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        .music-bar { width: 3px; background-color: #3b82f6; border-radius: 1px; animation: wave 1s ease-in-out infinite; }
        .bar-2 { animation-delay: 0.2s; } .bar-3 { animation-delay: 0.4s; }

        .glass-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .profile-glow { box-shadow: 0 0 25px rgba(37, 99, 235, 0.4); }
        
        .team-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8)); border: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-glow { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); }

        #qrcode img { margin: 0 auto; border: 6px solid white; border-radius: 12px; }

        /* Ajuste para Notch en móviles modernos */
        @supports (padding-top: env(safe-area-inset-top)) {
            .safe-top { padding-top: env(safe-area-inset-top); }
            .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex justify-center items-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS INTEGRADOS (SVG) ---

        const VerifiedBadge = ({ className = "w-4 h-4" }) => (
            <svg viewBox="0 0 100 100" className={className}>
                <rect x="15" y="15" width="70" height="70" rx="10" fill="#00A2FF" transform="rotate(-10 50 50)" />
                <path d="M30 52 L45 67 L72 35" fill="none" stroke="white" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
        );

        const PremiumIcon = ({ className = "w-6 h-6" }) => (
            <svg viewBox="0 0 32 32" fill="currentColor" className={`${className} premium-glow`}>
                <path d="M7.4 2L2 24.6L24.6 30L30 7.4L7.4 2ZM13.8 21.8L11.5 12.3L20.5 10.2L22.8 19.7L13.8 21.8Z" />
            </svg>
        );

        const YouTubeIcon = ({ className = "w-6 h-6" }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
        );

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
                user: <React.Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></React.Fragment>,
                users: <React.Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></React.Fragment>,
                qr: <path d="M3 3h7v7H3zm11 0h7v7h-7zm-11 11h7v7H3zm14 4h3m-3 3h3" />,
                external: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />,
                discord: <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="currentColor"/>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || <circle cx="12" cy="12" r="10" />}</svg>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [showQR, setShowQR] = useState(false);
            const qrRef = useRef(null);

            const staffList = [
                { role: "CEO", names: "Muneeb_ALT", verified: true, color: "text-blue-400" },
                { role: "FOUNDER & OWNER", names: "Muneeb_ALT & ElDramaKing_YBE", verified: true, color: "text-yellow-400" },
                { role: "ADMIN", names: "Khronix", verified: false, color: "text-red-500" },
                { role: "COLLABS", names: "Quataun by @haz3mn", verified: false, color: "text-purple-400" }
            ];

            useEffect(() => {
                if (showQR && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: window.location.href, width: 180, height: 180, colorDark: "#020617", colorLight: "#ffffff" });
                }
            }, [showQR]);

            return (
                <div className="w-full h-full flex justify-center items-center">
                    {/* Contenedor Adaptativo: Pantalla completa en móvil, Mockup en PC */}
                    <div className="relative w-full h-full sm:w-[410px] sm:h-[840px] bg-slate-900 sm:rounded-[3.5rem] sm:shadow-2xl sm:border-[12px] border-slate-800 overflow-hidden flex flex-col animate-in">
                        
                        {/* Barra Superior Estilo Móvil (Visible en PC, Oculta en Notch Móvil si se configura PWA) */}
                        <div className="h-12 sm:h-10 bg-slate-900 flex justify-between items-center px-10 pt-4 z-50 text-[10px] font-black text-slate-500 tracking-widest uppercase leading-none safe-top">
                            <span className="sm:inline hidden">EDK PRO v12.5</span>
                            <span className="sm:hidden inline">12:00</span>
                            <div className="flex gap-2 items-center">
                                <div className="w-4 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                            </div>
                        </div>

                        {/* Cabecera de la App */}
                        <header className="px-6 py-6 flex justify-between items-center bg-slate-900/80 backdrop-blur-xl border-b border-white/5 sticky top-0 z-40">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex flex-col items-center justify-center border border-white/20 shadow-lg relative overflow-hidden">
                                    <span className="text-[10px] font-black absolute italic uppercase leading-none">EDK</span>
                                </div>
                                <div>
                                    <h1 className="text-sm font-black tracking-tighter italic uppercase leading-none mb-1">EDK App Pro</h1>
                                    <p className="text-[9px] text-green-400 font-bold uppercase tracking-tighter italic tracking-widest">Global Network ✅</p>
                                </div>
                            </div>
                            <button onClick={() => setShowQR(!showQR)} className={`p-2.5 rounded-2xl border transition-all ${showQR ? 'bg-white text-blue-600' : 'bg-slate-800 text-slate-400 border-white/5'}`}>
                                <Icon name="qr" className="w-4 h-4" />
                            </button>
                        </header>

                        {/* Contenido Principal */}
                        <main className="flex-1 overflow-y-auto px-6 pt-4 pb-32 scrollbar-hide">
                            {showQR ? (
                                <div className="animate-in space-y-6 pt-10 text-center">
                                    <div className="glass-card p-8 rounded-[3rem]">
                                        <h2 className="text-xl font-black italic mb-6 uppercase tracking-tighter text-blue-400 leading-none">Acceso App</h2>
                                        <div id="qrcode" ref={qrRef} className="bg-white p-2 rounded-2xl inline-block shadow-2xl"></div>
                                        <p className="text-[9px] text-slate-500 mt-8 truncate px-4 font-mono uppercase">{window.location.href}</p>
                                    </div>
                                    <button onClick={() => setShowQR(false)} className="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-4">Volver</button>
                                </div>
                            ) : (
                                <>
                                    {activeTab === 'home' && (
                                        <div className="space-y-6 animate-in">
                                            <div className="p-8 rounded-[3rem] shadow-2xl relative overflow-hidden group min-h-[220px] flex flex-col justify-end border border-white/10 bg-gradient-to-br from-blue-600 to-indigo-900">
                                                <div className="relative z-10">
                                                    <h2 className="text-3xl font-black mb-1 italic tracking-tighter uppercase leading-none">EDKSTUDIOS</h2>
                                                    <p className="text-blue-100 text-[11px] mb-6 font-medium italic opacity-80 uppercase tracking-widest leading-none">Comunidad líder en Roblox</p>
                                                    <a href="https://www.roblox.com/share/g/89024247" target="_blank" className="bg-white text-blue-700 px-6 py-3 rounded-2xl font-black text-[10px] uppercase no-underline inline-flex items-center gap-2 shadow-xl active:scale-95 transition-all">Unirse <Icon name="users" className="w-3 h-3" /></a>
                                                </div>
                                                <Icon name="users" className="absolute -right-8 -bottom-8 w-44 h-44 opacity-10 rotate-12 group-hover:rotate-0 transition-transform duration-700" />
                                            </div>

                                            <div className="glass-card p-6 rounded-[2.5rem]">
                                                <h3 className="text-[10px] font-black uppercase text-blue-400 mb-5 flex items-center gap-2 tracking-widest leading-none uppercase tracking-tighter"><Icon name="shield" className="w-3.5 h-3.5" /> Jerarquía HD Admin</h3>
                                                <div className="space-y-3">
                                                    <div className="flex items-center justify-between p-4 rounded-3xl bg-slate-950/40 border border-white/5 transition-all">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-red-500 shadow-inner border border-white/5"><Icon name="shield" className="w-5 h-5" /></div>
                                                            <div><p className="font-black text-sm uppercase leading-none mb-1 text-white">HeadAdmin</p><p className="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">@27kDomin</p></div>
                                                        </div>
                                                        <VerifiedBadge />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'youtube' && (
                                        <div className="animate-in space-y-6 text-center pt-4">
                                            <div className="bg-red-600/10 p-8 rounded-[3rem] border border-red-500/20 shadow-xl text-white">
                                                <YouTubeIcon className="w-12 h-12 text-white mx-auto mb-4" />
                                                <h2 className="text-xl font-black italic uppercase tracking-tighter uppercase leading-none">@3ldramaking</h2>
                                                <span className="px-4 py-1.5 bg-red-600 text-[10px] font-black rounded-full text-white uppercase shadow-lg inline-block mt-3 tracking-widest leading-none uppercase">683 SUBS</span>
                                            </div>
                                            <a href="https://www.youtube.com/@3ldramaking" target="_blank" className="bg-red-600/20 border border-red-500/30 text-white w-full py-5 rounded-3xl font-black text-xs uppercase flex items-center justify-center no-underline shadow-xl uppercase tracking-widest">Ir al Canal</a>
                                        </div>
                                    )}

                                    {activeTab === 'team' && (
                                        <div className="animate-in space-y-6 pt-4 pb-10">
                                            <div className="flex items-center gap-3 mb-6 px-2 text-white">
                                                <PremiumIcon className="w-8 h-8 text-white" />
                                                <h2 className="text-2xl font-black italic uppercase tracking-tighter">Staff Oficial</h2>
                                            </div>
                                            <div className="space-y-4">
                                                {staffList.map((person, idx) => (
                                                    <div key={idx} className="team-card p-6 rounded-[2.2rem] shadow-xl relative overflow-hidden group">
                                                        <div className="absolute top-0 right-0 w-24 h-24 bg-white/5 -mr-8 -mt-8 rounded-full blur-2xl group-hover:bg-blue-500/10 transition-colors"></div>
                                                        <div className="flex flex-col gap-2 relative z-10 text-white">
                                                            <div className="flex items-center justify-between">
                                                                <span className={`text-[10px] font-black uppercase tracking-[0.2em] ${person.color}`}>{person.role}</span>
                                                                {person.verified && <VerifiedBadge className="w-5 h-5 shadow-lg" />}
                                                            </div>
                                                            <h3 className="text-lg font-black tracking-tight uppercase italic leading-none">{person.names}</h3>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'owner' && (
                                        <div className="animate-in pt-4 text-center">
                                            <div className="glass-card p-10 rounded-[4rem] relative overflow-hidden shadow-2xl text-white">
                                                <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-blue-600/20 to-transparent"></div>
                                                <div className="relative pt-6 mb-6">
                                                    <div className="w-32 h-32 bg-gradient-to-tr from-blue-600 via-blue-400 to-cyan-300 rounded-full p-1.5 mx-auto profile-glow">
                                                        <div className="w-full h-full bg-slate-900 rounded-full flex items-center justify-center border-4 border-slate-900 overflow-hidden relative shadow-inner">
                                                            <img src="OWNER.png" className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                                            <div className="hidden absolute inset-0 items-center justify-center text-white/20 bg-slate-800"><Icon name="user" className="w-14 h-14" /></div>
                                                        </div>
                                                    </div>
                                                    <div className="absolute bottom-1 right-1/2 translate-x-12 bg-blue-600 p-2.5 rounded-full border-4 border-slate-900 shadow-xl">
                                                        <Icon name="crown" className="w-5 h-5 text-white" />
                                                    </div>
                                                </div>
                                                <div className="flex items-center justify-center gap-2 mb-1">
                                                    <h2 className="text-3xl font-black italic uppercase tracking-tighter leading-none">MUNEEB_ALT</h2>
                                                    <VerifiedBadge className="w-7 h-7 shadow-lg" />
                                                </div>
                                                <p className="text-blue-500 font-mono text-[9px] uppercase font-bold tracking-[0.4em] mb-10 italic">@ElDramaKing_ALT</p>
                                                <div className="bg-slate-950/60 p-6 rounded-[2.5rem] border border-white/5 text-left flex justify-between items-center group shadow-inner">
                                                    <div><p className="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1 italic leading-none uppercase tracking-tighter">Rango Global</p><p className="text-sm font-black text-blue-100 italic uppercase tracking-tighter leading-none uppercase tracking-tighter">Founder & Owner</p></div>
                                                    <div className="w-10 h-10 bg-green-500/10 rounded-full flex items-center justify-center shadow-lg"><VerifiedBadge className="w-6 h-6" /></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </main>

                        {/* Navegación Inferior (Adaptada) */}
                        <nav className="absolute bottom-0 left-0 w-full h-24 bg-slate-900/95 backdrop-blur-2xl border-t border-white/5 px-4 flex justify-around items-center z-[100] safe-bottom">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === 'home' ? 'text-blue-500 scale-110 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Icon name="home" className="w-6 h-6" /><span className="text-[8px] font-black uppercase italic tracking-tighter">Inicio</span>
                            </button>
                            <button onClick={() => setActiveTab('youtube')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === 'youtube' ? 'text-red-500 scale-110 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                                <YouTubeIcon className="w-6 h-6" /><span className="text-[8px] font-black uppercase italic tracking-tighter uppercase">Youtube</span>
                            </button>
                            
                            <div className="relative -top-8 flex gap-4">
                                <button onClick={() => window.open('https://discord.gg/Bnd2puz7BZ', '_blank')} className="w-14 h-14 rounded-[1.8rem] flex items-center justify-center shadow-[0_10px_25px_rgba(88,101,242,0.4)] border-4 border-slate-900 transform active:scale-90 transition-all bg-[#5865F2]">
                                    <Icon name="discord" className="w-7 h-7 text-white" />
                                </button>
                                <button onClick={() => setActiveTab('team')} className={`w-14 h-14 rounded-[1.8rem] flex items-center justify-center shadow-[0_10px_25px_rgba(255,255,255,0.2)] border-4 border-slate-900 transform active:scale-90 transition-all ${activeTab === 'team' ? 'bg-white text-black' : 'bg-slate-800 text-white'}`}>
                                    <PremiumIcon className="w-7 h-7" />
                                </button>
                            </div>

                            <button onClick={() => setActiveTab('owner')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === 'owner' ? 'text-blue-500 scale-110 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Icon name="user" className="w-6 h-6" /><span className="text-[8px] font-black uppercase italic tracking-tighter uppercase leading-none uppercase tracking-widest">Owner</span>
                            </button>
                        </nav>

                        {/* Home Indicator iOS Style (Solo visible en PC) */}
                        <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/10 rounded-full sm:block hidden"></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
