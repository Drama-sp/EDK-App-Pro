<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDK App Pro - v19.1 Social Update</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.jpg">
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EDK App Pro">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            touch-action: manipulation;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Contenedor Maestro Unificado (Igual al de LOUNGE) */
        .master-card { 
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            border-radius: 2.5rem;
            overflow: hidden;
            width: 100%;
            height: auto;
            position: relative;
            padding: 2rem; /* p-8 */
        }
        @media (min-width: 640px) {
            .master-card { 
                border-radius: 3.1rem; 
                padding: 2.5rem; /* p-10 */
            }
        }
        
        .xp-bar-glow { box-shadow: 0 0 15px var(--theme-color-soft); }
        
        .premium-glow { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); }

        @supports (padding-top: env(safe-area-inset-top)) { 
            .safe-top { padding-top: env(safe-area-inset-top); } 
            .safe-bottom { padding-bottom: env(safe-area-inset-bottom); } 
        }

        .edk-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        .edk-input:focus { border-color: var(--theme-color); background: rgba(255, 255, 255, 0.05); }

        #qrcode img, #vip-qrcode img { 
            margin: 0 auto; 
            border-radius: 0.8rem; 
            border: 6px solid white;
            max-width: 100%;
            height: auto !important;
        }

        #reader { 
            border: none !important; 
            border-radius: 1.5rem; 
            overflow: hidden;
            width: 100% !important;
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex justify-center items-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const VerifiedBadge = ({ className = "w-4 h-4", color = "#00A2FF" }) => (
            <svg viewBox="0 0 100 100" className={className}>
                <rect x="15" y="15" width="70" height="70" rx="10" fill={color} transform="rotate(-10 50 50)" />
                <path d="M30 52 L45 67 L72 35" fill="none" stroke="white" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
        );

        const RobloxPremiumIcon = ({ className = "w-6 h-6" }) => (
            <svg viewBox="0 0 32 32" fill="currentColor" className={`${className} premium-glow`}>
                <path d="M7.4 2L2 24.6L24.6 30L30 7.4L7.4 2ZM13.8 21.8L11.5 12.3L20.5 10.2L22.8 19.7L13.8 21.8Z" />
            </svg>
        );

        const Icon = ({ name, className = "w-6 h-6", style = {} }) => {
            const icons = {
                home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                brush: <path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08" />,
                id: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM4 8v10h16V8H4z" />,
                lock: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" strokeWidth="2" />,
                cart: <React.Fragment><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" /></React.Fragment>,
                coins: <React.Fragment><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18" /><path d="M7 6h1v4"/><path d="M17 10h1v4"/></React.Fragment>,
                user: <React.Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></React.Fragment>,
                qr: <React.Fragment><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></React.Fragment>,
                discord: <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.078.078 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="currentColor"/>,
                external: <React.Fragment><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 22 3 22 10"/><line x1="10" y1="14" x2="22" y2="2"/></React.Fragment>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>{icons[name] || <circle cx="12" cy="12" r="10" />}</svg>;
        };

        const YouTubeIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [theme, setTheme] = useState(() => localStorage.getItem('edk_theme') || 'blue');
            const [xp, setXp] = useState(() => parseInt(localStorage.getItem('edk_xp')) || 0);
            const [coins, setCoins] = useState(() => parseInt(localStorage.getItem('edk_coins')) || 100);
            const [inventory, setInventory] = useState(() => JSON.parse(localStorage.getItem('edk_inventory')) || []);
            const [vipName, setVipName] = useState("");
            const [vipRank, setVipRank] = useState("FA");
            const [showID, setShowID] = useState(false);
            const [generatedID, setGeneratedID] = useState("");
            const [pin, setPin] = useState("");
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [scanResult, setScanResult] = useState(null);
            const [hasNewVideo, setHasNewVideo] = useState(true);

            const qrRef = useRef(null);
            const cardQrRef = useRef(null);
            const html5Scanner = useRef(null);

            const groupLink = "https://www.roblox.com/share/g/89024247";
            const discordLink = "https://discord.gg/Bnd2puz7BZ";
            const youtubeChannel = "https://www.youtube.com/@3ldramaking";

            const themes = {
                blue: { name: 'EDK Blue', color: '#3b82f6', soft: 'rgba(59,130,246,0.2)', grad: 'from-blue-600 to-indigo-900' },
                red: { name: 'EDK Fire', color: '#ef4444', soft: 'rgba(239,68,68,0.2)', grad: 'from-red-600 to-orange-800' },
                gold: { name: 'EDK Gold', color: '#f59e0b', soft: 'rgba(245,158,11,0.2)', grad: 'from-yellow-500 to-amber-700' },
                green: { name: 'EDK Hack', color: '#10b981', soft: 'rgba(16,185,129,0.2)', grad: 'from-green-600 to-emerald-900' }
            };

            const staffList = [
                { role: "CEO", names: "Muneeb_ALT", verified: true, color: "text-blue-400" },
                { role: "FOUNDER & OWNER", names: "Muneeb_ALT & ElDramaKing_YBE", verified: true, color: "text-yellow-400" },
                { role: "ADMIN", names: "Khronix", verified: false, color: "text-red-500" },
                { role: "COLLABS", names: "Quataun by @haz3mn", verified: false, color: "text-purple-400" }
            ];

            const activeTheme = themes[theme];
            const level = Math.floor(xp / 100) + 1;

            useEffect(() => {
                localStorage.setItem('edk_theme', theme);
                localStorage.setItem('edk_xp', xp);
                localStorage.setItem('edk_coins', coins);
                localStorage.setItem('edk_inventory', JSON.stringify(inventory));
                document.documentElement.style.setProperty('--theme-color', activeTheme.color);
                document.documentElement.style.setProperty('--theme-color-soft', activeTheme.soft);
            }, [theme, xp, coins, inventory]);

            useEffect(() => {
                if (activeTab === 'scanner' && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: window.location.href, width: 256, height: 256 });
                    startScanner();
                } else { stopScanner(); }
            }, [activeTab]);

            useEffect(() => {
                if (showID && generatedID && cardQrRef.current) {
                    cardQrRef.current.innerHTML = "";
                    new QRCode(cardQrRef.current, { text: generatedID, width: 128, height: 128 });
                }
            }, [showID, generatedID]);

            const startScanner = () => {
                setTimeout(() => {
                    if (!document.getElementById("reader")) return;
                    html5Scanner.current = new Html5QrcodeScanner("reader", { 
                        fps: 10, 
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0
                    });
                    html5Scanner.current.render(onScanSuccess);
                }, 100);
            };

            const stopScanner = () => { if (html5Scanner.current) html5Scanner.current.clear().catch(e => {}); };

            const onScanSuccess = (decodedText) => {
                const id = decodedText.trim().toUpperCase();
                if (!id.startsWith("EDK-")) {
                    setScanResult({ rank: "Error", color: "text-red-500", msg: "Código no reconocido." });
                    return;
                }
                const suffix = id.split("-").pop();
                const ranks = {
                    'FA': { rank: 'FAN', color: 'text-blue-400', msg: '¡Seguidor fiel de EDK!' },
                    'ADM': { rank: 'ADMIN', color: 'text-red-500', msg: 'Acceso total concedido.' },
                    'SB': { rank: 'SUB', color: 'text-purple-400', msg: '¡Gracias por suscribirte!' },
                    'PRM': { rank: 'PREMIUM', color: 'text-yellow-400', msg: 'Socio VIP de EDK Studios.' }
                };
                setScanResult(ranks[suffix] || { rank: "???", color: "text-white", msg: "ID Válido, Rango Desconocido." });
                stopScanner();
            };

            const buyItem = (item) => {
                if (coins >= item.price && !inventory.includes(item.id)) {
                    setCoins(p => p - item.price);
                    setInventory([...inventory, item.id]);
                    setXp(p => p + 50);
                }
            };

            const checkPin = (v) => {
                if (v === "2027") { setIsUnlocked(true); setXp(p => p + 40); }
                else if (v.length >= 4) setTimeout(() => setPin(""), 500);
            };

            return (
                <div className="w-full h-full flex justify-center items-center overflow-hidden">
                    <div className="relative w-full h-full sm:max-w-[410px] sm:max-h-[840px] bg-slate-900 sm:rounded-[3.5rem] sm:shadow-2xl sm:border-[12px] border-slate-800 overflow-hidden flex flex-col animate-in">
                        
                        <header className="flex-shrink-0 h-20 bg-slate-950 flex flex-col px-6 pt-6 z-50 border-b border-white/5 safe-top">
                            <div className="flex justify-between items-center mb-2">
                                <div className="flex items-center gap-3">
                                    <div className="text-left">
                                        <p className="text-[8px] font-black text-white/40 uppercase tracking-widest leading-none">Nivel</p>
                                        <p className="text-[12px] font-black italic leading-none">LVL {level}</p>
                                    </div>
                                    <div className="h-6 w-[1px] bg-white/10 mx-1"></div>
                                    <div className="text-left">
                                        <p className="text-[8px] font-black text-white/40 uppercase tracking-widest leading-none">Coins</p>
                                        <p className="text-[12px] font-black text-yellow-400 flex items-center gap-1 leading-none"><Icon name="coins" className="w-3 h-3"/> {coins}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={() => {setHasNewVideo(false); setActiveTab('youtube')}} className="relative">
                                        <YouTubeIcon className="w-6 h-6 text-red-500" />
                                        {hasNewVideo && <div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-white rounded-full media-alert"></div>}
                                    </button>
                                    <img src="icon.jpg" className="w-8 h-8 rounded-lg border border-white/10 shadow-lg" alt="Logo" />
                                </div>
                            </div>
                            <div className="w-full h-1 bg-white/5 rounded-full overflow-hidden xp-bar-glow">
                                <div className="h-full transition-all duration-1000" style={{ width: `${xp % 100}%`, backgroundColor: activeTheme.color }}></div>
                            </div>
                        </header>

                        <main className="flex-grow overflow-y-auto scrollbar-hide px-4 sm:px-6 pt-6 pb-32">
                            
                            {activeTab === 'home' && (
                                <div className="animate-in space-y-6">
                                    <div className={`master-card bg-gradient-to-br ${activeTheme.grad} border-none min-h-[220px] flex flex-col justify-end`}>
                                        <div className="relative z-10 text-left">
                                            <h2 className="text-3xl sm:text-4xl font-black italic leading-none mb-1 tracking-tighter uppercase">EDKSTUDIOS</h2>
                                            <p className="text-[9px] sm:text-[10px] mb-8 font-medium italic opacity-70 uppercase tracking-widest leading-none">Oficial Community</p>
                                            <div className="flex gap-2">
                                                <a href={groupLink} target="_blank" className="bg-white text-black px-5 py-3 rounded-2xl font-black text-[10px] uppercase shadow-xl no-underline">Unirse</a>
                                                <button onClick={() => setActiveTab('team')} className="bg-white/10 text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/20">Staff</button>
                                            </div>
                                        </div>
                                        <Icon name="home" className="absolute -right-8 -bottom-8 w-44 h-44 opacity-10 rotate-12" />
                                    </div>

                                    <div className="master-card flex items-center justify-between border-l-4" style={{borderColor: activeTheme.color}}>
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 rounded-2xl bg-slate-900 border border-white/10 overflow-hidden">
                                                <img src="icon.jpg" className="w-full h-full object-cover" alt="Muneeb_ALT" />
                                            </div>
                                            <div className="text-left">
                                                <div className="flex items-center gap-1.5">
                                                    <p className="font-black text-sm uppercase italic leading-none">Muneeb_ALT</p>
                                                    <VerifiedBadge color={activeTheme.color} className="w-4 h-4" />
                                                </div>
                                                <p className="text-[9px] text-white/40 font-bold uppercase tracking-widest mt-1">FOUNDER & OWNER</p>
                                            </div>
                                        </div>
                                        <div className="w-2.5 h-2.5 rounded-full bg-green-500 shadow-lg shadow-green-500/50"></div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'youtube' && (
                                <div className="animate-in space-y-6">
                                    <div className="master-card text-center bg-red-600/10 border-red-500/20">
                                        <YouTubeIcon className="w-16 h-16 text-red-600 mx-auto mb-4" />
                                        <h2 className="text-2xl font-black italic uppercase mb-2">YouTube</h2>
                                        <p className="text-slate-400 text-[10px] uppercase font-bold mb-8 opacity-60">Contenido de @3ldramaking</p>
                                        <a href={youtubeChannel} target="_blank" className="bg-red-600 text-white w-full py-4 rounded-3xl font-black text-[10px] uppercase block no-underline shadow-xl active:scale-95 transition-all">Abrir Canal</a>
                                    </div>
                                    <div className="master-card text-center bg-indigo-600/10 border-indigo-500/20">
                                        <Icon name="discord" className="w-16 h-16 text-[#5865F2] mx-auto mb-4" />
                                        <h2 className="text-2xl font-black italic uppercase mb-2 text-white">Discord</h2>
                                        <p className="text-slate-400 text-[10px] uppercase font-bold mb-8 opacity-60">Comunidad oficial EDK</p>
                                        <a href={discordLink} target="_blank" className="bg-[#5865F2] text-white w-full py-4 rounded-3xl font-black text-[10px] uppercase block no-underline shadow-xl active:scale-95 transition-all">Servidor Oficial</a>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'scanner' && (
                                <div className="animate-in space-y-6">
                                    <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><Icon name="qr" className="w-8 h-8" style={{color: activeTheme.color}} /> Scanner</h2>
                                    <div className="master-card space-y-6">
                                        <div className="text-left">
                                            <p className="text-[9px] font-black uppercase text-white/40 tracking-widest mb-1 italic">Identidad Digital</p>
                                            <h3 className="text-lg font-black uppercase italic leading-none text-white">Cámara en Vivo</h3>
                                        </div>
                                        <div id="reader" className="w-full aspect-square bg-black/60 rounded-3xl shadow-inner"></div>
                                        {scanResult && (
                                            <div className="animate-in p-5 rounded-[2rem] bg-white/5 border border-white/10 text-center">
                                                <p className={`text-xs font-black uppercase tracking-widest ${scanResult.color}`}>Rango: {scanResult.rank}</p>
                                                <p className="text-[10px] opacity-60 italic mt-1">{scanResult.msg}</p>
                                                <button onClick={() => {setScanResult(null); startScanner();}} className="mt-4 text-[8px] font-black uppercase px-4 py-2 border border-white/10 rounded-xl">Reiniciar</button>
                                            </div>
                                        )}
                                    </div>
                                    <div className="master-card text-center">
                                        <p className="text-[9px] font-black opacity-40 uppercase mb-6 italic">Compartir la Aplicación</p>
                                        <div className="bg-white p-5 rounded-[2rem] inline-block shadow-2xl">
                                            <div id="qrcode" ref={qrRef}></div>
                                        </div>
                                        <p className="text-[9px] font-bold text-slate-500 mt-6 uppercase opacity-40 italic tracking-widest leading-none">Escanea para Abrir</p>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'market' && (
                                <div className="animate-in space-y-6">
                                    <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><Icon name="cart" className="w-8 h-8 text-yellow-400" /> Mercado</h2>
                                    <div className="master-card space-y-4">
                                        {[
                                            { id: 'badge_elite', name: 'Insignia Élite', price: 200, icon: '🌟', desc: 'Sello estelar en perfil' },
                                            { id: 'gold_frame', name: 'Marco de Oro', price: 500, icon: '🖼️', desc: 'Borde premium para carnet' },
                                            { id: 'custom_status', name: 'Rango Especial', price: 1000, icon: '👑', desc: 'Status ELITE en sistema' }
                                        ].map(item => (
                                            <div key={item.id} className={`p-5 rounded-[2rem] flex items-center justify-between border border-white/5 bg-white/5 ${inventory.includes(item.id) ? 'opacity-30' : ''}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className="text-3xl">{item.icon}</div>
                                                    <div className="text-left">
                                                        <p className="font-black text-[11px] uppercase mb-0.5">{item.name}</p>
                                                        <p className="text-[9px] opacity-40 leading-none">{item.desc}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => buyItem(item)} disabled={inventory.includes(item.id) || coins < item.price} className={`px-4 py-2 rounded-xl font-black text-[10px] uppercase ${inventory.includes(item.id) ? 'bg-green-500/20 text-green-400' : 'bg-white text-black active:scale-95 transition-all'}`}>
                                                    {inventory.includes(item.id) ? 'PROPIO' : `${item.price} XP`}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'vip_card' && (
                                <div className="animate-in space-y-6">
                                    <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><Icon name="id" className="w-8 h-8" style={{color: activeTheme.color}} /> Identidad</h2>
                                    <div className="master-card text-center">
                                        {!showID ? (
                                            <div className="space-y-6">
                                                <input type="text" placeholder="Usuario Roblox" value={vipName} onChange={(e) => setVipName(e.target.value)} className="w-full edk-input rounded-[1.5rem] p-5 text-center text-sm uppercase font-bold"/>
                                                <div className="grid grid-cols-4 gap-2">
                                                    {['FA', 'SB', 'ADM', 'PRM'].map(r => (
                                                        <button key={r} onClick={() => setVipRank(r)} className={`py-3 rounded-xl text-[10px] font-black border transition-all ${vipRank === r ? 'bg-white text-black border-white' : 'bg-white/5 border-white/10 text-white/40'}`}>{r}</button>
                                                    ))}
                                                </div>
                                                <button onClick={() => { if(vipName.length > 2) { setGeneratedID(`EDK-${vipName.slice(0,3).toUpperCase()}-${Math.floor(1000+Math.random()*9000)}-${vipRank}`); setShowID(true); setXp(p => p + 75); }}} className="w-full py-5 rounded-[1.5rem] font-black text-[10px] uppercase text-white shadow-xl active:scale-95 transition-all" style={{backgroundColor: activeTheme.color}}>Generar Carnet</button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center animate-in">
                                                <div className={`w-full aspect-[1.6/1] rounded-[2rem] p-6 relative overflow-hidden shadow-2xl border transition-all ${inventory.includes('gold_frame') ? 'border-yellow-400 border-4 shadow-yellow-400/20' : 'border-white/20'}`} style={{backgroundColor: activeTheme.color}}>
                                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 -mr-8 -mt-8 rounded-full blur-xl"></div>
                                                    <div className="flex justify-between items-start mb-6 relative z-10">
                                                        <p className="text-[10px] font-black uppercase tracking-widest leading-none">EDK OFFICIAL VIP</p>
                                                        <div className="p-1.5 bg-white rounded-lg"><div id="vip-qrcode" ref={cardQrRef}></div></div>
                                                    </div>
                                                    <p className="text-3xl font-black uppercase italic leading-none mb-6 relative z-10 truncate text-white">{vipName}</p>
                                                    <div className="flex justify-between items-end relative z-10 text-white text-left">
                                                        <div><p className="text-[6px] opacity-50 font-black uppercase">MEMBER ID</p><p className="text-[10px] font-bold" style={{fontFamily: 'JetBrains Mono'}}>{generatedID}</p></div>
                                                        {inventory.includes('badge_elite') && <div className="text-2xl drop-shadow-lg">🌟</div>}
                                                    </div>
                                                </div>
                                                <button onClick={() => setShowID(false)} className="mt-8 text-[9px] font-black text-slate-500 uppercase border-b border-white/5 pb-1 active:text-white transition-colors">Reset Identidad</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'team' && (
                                <div className="animate-in space-y-6 pb-10">
                                    <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><RobloxPremiumIcon className="w-8 h-8 text-white" /> Staff</h2>
                                    <div className="master-card space-y-4">
                                        <p className="text-[9px] opacity-40 uppercase font-black italic mb-4 tracking-widest">Agradecimientos al equipo EDK</p>
                                        {staffList.map((person, idx) => (
                                            <div key={idx} className="p-5 rounded-[2rem] border border-white/5 bg-white/5 flex flex-col gap-1 hover:bg-white/10 transition-colors">
                                                <div className="flex items-center justify-between">
                                                    <span className={`text-[8px] font-black uppercase tracking-widest ${person.color}`}>{person.role}</span>
                                                    {person.verified && <VerifiedBadge color={activeTheme.color} className="w-4 h-4" />}
                                                </div>
                                                <h3 className="text-lg font-black tracking-tight uppercase italic leading-none">{person.names}</h3>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'secret' && (
                                <div className="animate-in h-full flex flex-col pt-4 items-center">
                                    <h2 className="text-2xl font-black italic uppercase flex items-center gap-3 mb-10"><Icon name="lock" className="w-8 h-8" style={{color: activeTheme.color}} /> Lounge</h2>
                                    <div className="master-card flex flex-col items-center justify-center min-h-[300px]">
                                        {!isUnlocked ? (
                                            <div className="w-full max-w-[280px]">
                                                <div className="flex justify-center gap-4 mb-12">
                                                    {[...Array(4)].map((_, i) => (
                                                        <div key={i} className={`w-3.5 h-3.5 rounded-full border-2 transition-all ${pin.length > i ? 'bg-white border-white scale-110 shadow-[0_0_15px_white]' : 'border-white/20'}`} style={{backgroundColor: pin.length > i ? activeTheme.color : 'transparent'}}></div>
                                                    ))}
                                                </div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    {[1,2,3,4,5,6,7,8,9,'C',0,'X'].map(num => (
                                                        <button key={num} onClick={() => { if(num === 'C') setPin(""); else if(num === 'X') setPin(pin.slice(0,-1)); else if(pin.length < 4) { const n = pin + num; setPin(n); checkPin(n); } }} className="w-14 h-14 rounded-2xl bg-white/5 border border-white/5 text-lg font-bold active:scale-90 hover:bg-white/10 transition-all text-white">{num}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center py-10 w-full animate-in">
                                                <h3 className="text-2xl font-black italic mb-6 uppercase text-yellow-400">Acceso Élite</h3>
                                                <p className="text-2xl font-black tracking-widest select-all text-white font-mono">EDK_ULTRA_2027</p>
                                                <p className="text-[9px] text-white/40 mt-6 uppercase font-black italic tracking-widest">Código Maestro Autorizado</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'themes' && (
                                <div className="animate-in pt-4">
                                    <h2 className="text-2xl font-black italic uppercase flex items-center gap-3 mb-10"><Icon name="brush" className="w-8 h-8" style={{color: activeTheme.color}} /> Temas</h2>
                                    <div className="master-card grid grid-cols-2 gap-8 justify-items-center">
                                        {Object.entries(themes).map(([id, t]) => (
                                            <div key={id} onClick={() => setTheme(id)} className="flex flex-col items-center gap-3 cursor-pointer group">
                                                <div className={`w-[60px] h-[60px] rounded-[22px] transition-all border-4 ${theme === id ? 'border-white scale-110 shadow-2xl' : 'border-transparent opacity-40 group-hover:opacity-100'}`} style={{ backgroundColor: t.color }}></div>
                                                <span className={`text-[9px] font-black uppercase tracking-widest ${theme === id ? 'text-white' : 'text-slate-500'}`}>{t.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </main>

                        <nav className="flex-shrink-0 absolute bottom-0 left-0 w-full h-24 bg-slate-950/90 backdrop-blur-3xl border-t border-white/5 px-2 flex justify-around items-center z-[100] safe-bottom">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${activeTab === 'home' ? 'font-bold' : 'opacity-40'}`} style={{color: activeTab === 'home' ? activeTheme.color : 'white'}}><Icon name="home" className="w-5 h-5"/><span className="text-[5px] font-black uppercase tracking-tighter">Home</span></button>
                            <button onClick={() => setActiveTab('market')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${activeTab === 'market' ? 'font-bold' : 'opacity-40'}`} style={{color: activeTab === 'market' ? '#eab308' : 'white'}}><Icon name="cart" className="w-5 h-5"/><span className="text-[5px] font-black uppercase tracking-tighter">Tienda</span></button>
                            
                            <div className="relative -top-8 flex gap-2 sm:gap-3 p-2 bg-slate-900/80 backdrop-blur-2xl rounded-[1.8rem] sm:rounded-[2.5rem] border border-white/10 shadow-2xl">
                                <button onClick={() => setActiveTab('scanner')} className={`w-11 h-11 sm:w-12 sm:h-12 rounded-[1.2rem] sm:rounded-[1.5rem] flex items-center justify-center transition-all active:scale-90 ${activeTab === 'scanner' ? 'bg-white text-black shadow-xl scale-105' : 'bg-slate-800 text-white hover:bg-slate-700'}`}><Icon name="qr" className="w-5.5 h-5.5 sm:w-6 sm:h-6"/></button>
                                <button onClick={() => setActiveTab('vip_card')} className={`w-11 h-11 sm:w-12 sm:h-12 rounded-[1.2rem] sm:rounded-[1.5rem] flex items-center justify-center transition-all active:scale-90 ${activeTab === 'vip_card' ? 'bg-white text-black shadow-xl scale-105' : 'bg-slate-800 text-white hover:bg-slate-700'}`}><Icon name="id" className="w-5.5 h-5.5 sm:w-6 sm:h-6"/></button>
                                <button onClick={() => setActiveTab('secret')} className={`w-11 h-11 sm:w-12 sm:h-12 rounded-[1.2rem] sm:rounded-[1.5rem] flex items-center justify-center transition-all active:scale-90 ${activeTab === 'secret' ? 'bg-yellow-400 text-black shadow-lg shadow-yellow-400/20 scale-105' : 'bg-slate-800 text-white hover:bg-slate-700'}`}><Icon name="lock" className="w-5.5 h-5.5 sm:w-6 sm:h-6"/></button>
                            </div>

                            <button onClick={() => setActiveTab('themes')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${activeTab === 'themes' ? 'font-bold' : 'opacity-40'}`} style={{color: activeTab === 'themes' ? activeTheme.color : 'white'}}><Icon name="brush" className="w-5 h-5"/><span className="text-[5px] font-black uppercase tracking-tighter">Temas</span></button>
                            <button onClick={() => setActiveTab('youtube')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${activeTab === 'youtube' ? 'font-bold' : 'opacity-40'}`} style={{color: activeTab === 'youtube' ? '#ef4444' : 'white'}}><YouTubeIcon className="w-5 h-5"/><span className="text-[5px] font-black uppercase tracking-tighter">Social</span></button>
                        </nav>

                        <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/10 rounded-full sm:block hidden"></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
