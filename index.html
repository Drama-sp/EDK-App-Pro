<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDK-App Pro - Comunidad EDKSTUDIOS</title>
    
    <!-- Configuración PWA y Iconos -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-in { animation: slideUp 0.5s ease-out forwards; }

        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        .music-bar {
            width: 3px;
            background-color: #ef4444;
            border-radius: 1px;
            animation: wave 1s ease-in-out infinite;
        }
        .bar-2 { animation-delay: 0.2s; } .bar-3 { animation-delay: 0.4s; }

        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 12px;
        }

        .profile-glow { box-shadow: 0 0 25px rgba(37, 99, 235, 0.5); }
        .comment-bubble { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, arrayUnion, Timestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Inicializar Firebase con configuración global
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'edk-app-pro-id';

        // Exponer utilidades para el componente React
        window.EDK_DB = { 
            auth, db, appId, 
            collection, addDoc, onSnapshot, doc, updateDoc, arrayUnion, Timestamp, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
                shieldCheck: <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></React.Fragment>,
                user: <React.Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></React.Fragment>,
                users: <React.Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></React.Fragment>,
                home: <React.Fragment><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></React.Fragment>,
                message: <React.Fragment><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></React.Fragment>,
                youtube: <React.Fragment><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58z" /><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" /></React.Fragment>,
                play: <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" />,
                pause: <React.Fragment><rect x="6" y="4" width="4" height="16" fill="currentColor" /><rect x="14" y="4" width="4" height="16" fill="currentColor" /></React.Fragment>,
                qr: <React.Fragment><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="3" height="3" /><rect x="18" y="18" width="3" height="3" /></React.Fragment>,
                send: <React.Fragment><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></React.Fragment>,
                reply: <React.Fragment><polyline points="9 17 4 12 9 7" /><path d="M20 18v-2a4 4 0 0 0-4-4H4" /></React.Fragment>,
                checkCircle: <React.Fragment><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></React.Fragment>,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                external: <React.Fragment><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 22 3 22 10" /><line x1="10" y1="14" x2="22" y2="2" /></React.Fragment>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || <circle cx="12" cy="12" r="10" />}</svg>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isPlaying, setIsPlaying] = useState(false);
            const [showQR, setShowQR] = useState(false);
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState("");
            const [hasProfile, setHasProfile] = useState(false);
            const [comments, setComments] = useState([]);
            const [newComment, setNewComment] = useState("");
            const [replyingTo, setReplyingTo] = useState(null);
            const [expandedRank, setExpandedRank] = useState(null);
            
            const audioRef = useRef(null);
            const qrRef = useRef(null);
            const isInitialLoad = useRef(true);

            // 1. Inicializar Auth y Perfil Local
            useEffect(() => {
                const savedName = localStorage.getItem('edk_username');
                if (savedName) {
                    setUserName(savedName);
                    setHasProfile(true);
                }

                const initFirebase = setInterval(async () => {
                    if (window.EDK_DB) {
                        clearInterval(initFirebase);
                        const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.EDK_DB;
                        
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                            onAuthStateChanged(auth, (u) => setUser(u));
                        } catch (e) {
                            console.error("Fallo de autenticación Firebase:", e);
                        }
                    }
                }, 100);
                
                return () => clearInterval(initFirebase);
            }, []);

            // 2. Escuchar Comentarios (Gated by user)
            useEffect(() => {
                if (!user || !window.EDK_DB) return;
                const { db, appId, collection, onSnapshot } = window.EDK_DB;
                
                // Path estricto: /artifacts/{appId}/public/data/comments
                const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'comments');
                
                const unsubscribe = onSnapshot(commentsRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Ordenar en memoria JS
                    const sorted = data.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                    
                    // Notificación si hay mensajes nuevos (no carga inicial)
                    if (!isInitialLoad.current && sorted.length > comments.length) {
                        const latest = sorted[0];
                        if (latest.user !== userName && Notification.permission === "granted") {
                            new Notification("EDK Chat", { body: `${latest.user}: ${latest.text}`, icon: "icon.png" });
                        }
                    }
                    
                    setComments(sorted);
                    isInitialLoad.current = false;
                }, (err) => {
                    console.error("Error Firestore Snapshot:", err.message);
                });

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (showQR && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: window.location.href, width: 180, height: 180, colorDark: "#020617", colorLight: "#ffffff" });
                }
            }, [showQR]);

            const saveProfile = () => {
                if (userName.trim().length < 2) return;
                localStorage.setItem('edk_username', userName);
                setHasProfile(true);
            };

            const handleSend = async () => {
                if (!newComment.trim() || !user || !window.EDK_DB || !hasProfile) return;
                const { db, appId, collection, addDoc, doc, updateDoc, arrayUnion, Timestamp } = window.EDK_DB;
                
                const textCache = newComment;
                setNewComment("");

                try {
                    if (replyingTo) {
                        const commentDoc = doc(db, 'artifacts', appId, 'public', 'data', 'comments', replyingTo);
                        await updateDoc(commentDoc, {
                            replies: arrayUnion({ id: Date.now(), user: userName, text: textCache, timestamp: Date.now() })
                        });
                        setReplyingTo(null);
                    } else {
                        const commentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'comments');
                        await addDoc(commentsRef, {
                            user: userName,
                            text: textCache,
                            timestamp: Timestamp.now(),
                            isOwner: userName === "Muneeb_ALT",
                            replies: []
                        });
                    }
                } catch (err) {
                    console.error("Error de envío:", err);
                    setNewComment(textCache); // Restaurar si falla
                }
            };

            const toggleMusic = () => {
                const audio = audioRef.current;
                if (!audio) return;
                if (isPlaying) { audio.pause(); setIsPlaying(false); } 
                else { audio.play().then(() => setIsPlaying(true)).catch(() => setIsPlaying(false)); }
            };

            return (
                <div className="flex justify-center items-center min-h-screen p-0 sm:p-4 relative text-white">
                    <audio ref={audioRef} src="musica.mp3" onEnded={() => setIsPlaying(false)} preload="auto" />

                    <div className="relative w-full max-w-[410px] h-[840px] bg-slate-900 rounded-[3.5rem] shadow-2xl border-[12px] border-slate-800 overflow-hidden flex flex-col animate-in">
                        
                        <div className="h-10 bg-slate-900 flex justify-between items-center px-10 pt-4 z-50 text-[11px] font-bold text-slate-400 italic tracking-widest uppercase">
                            <span>EDK LIVE v5.2</span>
                            <div className="flex gap-1.5 items-center">
                                <div className="w-4 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div>
                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                            </div>
                        </div>

                        <header className="px-6 py-6 flex justify-between items-center bg-slate-900/80 backdrop-blur-lg border-b border-white/5 sticky top-0 z-40">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center border border-white/20 shadow-lg overflow-hidden relative">
                                    <img src="icon.png" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
                                    <span className="text-[10px] font-black absolute">EDK</span>
                                </div>
                                <div>
                                    <h1 className="text-sm font-black tracking-tighter italic uppercase leading-none">EDK App Pro</h1>
                                    <p className="text-[9px] text-green-400 font-bold uppercase mt-1 tracking-tighter">{user ? 'Nube Sincronizada ✅' : 'Conectando...'}</p>
                                </div>
                            </div>
                            <button onClick={() => setShowQR(!showQR)} className={`p-2.5 rounded-2xl border transition-all ${showQR ? 'bg-white text-blue-600' : 'bg-slate-800 text-slate-400 border-white/5'}`}>
                                <Icon name="qr" className="w-4 h-4" />
                            </button>
                        </header>

                        <main className="flex-1 overflow-y-auto px-6 pt-4 pb-28 scrollbar-hide">
                            {showQR ? (
                                <div className="animate-in space-y-6 pt-10 text-center text-white">
                                    <div className="bg-white/5 p-8 rounded-[3rem] border border-white/10 shadow-xl">
                                        <h2 className="text-xl font-black italic mb-6 uppercase">Compartir EDK</h2>
                                        <div id="qrcode" ref={qrRef} className="bg-white p-2 rounded-2xl inline-block shadow-2xl"></div>
                                        <p className="text-[9px] text-slate-500 mt-8 truncate px-4 font-mono uppercase italic">{window.location.href}</p>
                                    </div>
                                    <button onClick={() => setShowQR(false)} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Volver</button>
                                </div>
                            ) : (
                                <>
                                    {activeTab === 'home' && (
                                        <div className="space-y-6 animate-in">
                                            <div className="p-7 rounded-[2.5rem] bg-gradient-to-br from-blue-600 to-indigo-900 shadow-2xl relative overflow-hidden group">
                                                <h2 className="text-3xl font-black mb-1 italic tracking-tighter uppercase leading-none mb-2">EDKSTUDIOS</h2>
                                                <p className="text-blue-100 text-[11px] mb-8 font-medium">Únete a la comunidad líder en Roblox.</p>
                                                <a href="https://www.roblox.com/share/g/89024247" target="_blank" className="bg-white text-blue-700 px-6 py-3 rounded-2xl font-black text-[10px] uppercase no-underline inline-flex items-center gap-2 shadow-xl active:scale-95 transition-all">Entrar al Grupo <Icon name="external" className="w-3 h-3" /></a>
                                                <Icon name="users" className="absolute -right-8 -bottom-8 w-44 h-44 opacity-10 rotate-12" />
                                            </div>

                                            <div className="bg-slate-800/40 p-6 rounded-[2.5rem] border border-white/5 shadow-inner">
                                                <h3 className="text-[10px] font-black uppercase text-blue-400 mb-5 flex items-center gap-2 tracking-widest"><Icon name="shield" className="w-3.5 h-3.5" /> Jerarquía Oficial</h3>
                                                <div className="space-y-3">
                                                    <div className="flex items-center justify-between p-4 rounded-3xl bg-slate-950/40 border border-white/5">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-red-500"><Icon name="shieldCheck" className="w-5 h-5" /></div>
                                                            <div><p className="font-black text-sm uppercase leading-none mb-1">HeadAdmin</p><p className="text-[9px] text-slate-500 font-bold tracking-widest">@27kDomin</p></div>
                                                        </div>
                                                        <Icon name="checkCircle" className="w-4 h-4 text-blue-500" />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'youtube' && (
                                        <div className="animate-in space-y-6 text-center pt-4">
                                            <div className="bg-red-600/10 p-8 rounded-[3rem] border border-red-500/20 shadow-xl">
                                                <Icon name="youtube" className="w-12 h-12 text-white mx-auto mb-4" />
                                                <h2 className="text-xl font-black italic uppercase">@3ldramaking</h2>
                                                <span className="px-4 py-1.5 bg-red-600 text-[10px] font-black rounded-full text-white uppercase shadow-lg inline-block mt-3 tracking-widest">683 SUBS</span>
                                            </div>
                                            <div className="p-1.5 rounded-[2.5rem] bg-gradient-to-r from-red-500 to-red-800 shadow-2xl">
                                                <div className="w-full p-6 bg-slate-900/60 rounded-[2rem] flex items-center justify-between">
                                                    <button onClick={toggleMusic} className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 ${isPlaying ? 'bg-white text-red-600' : 'bg-red-600 text-white'}`}><Icon name={isPlaying ? "pause" : "play"} className="w-6 h-6" /></button>
                                                    <div className="text-right flex-1 px-4">
                                                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">BUILD TOGETHER</p>
                                                        <p className="text-xs font-bold text-white uppercase tracking-tighter">Tema Oficial</p>
                                                        {isPlaying && <div className="flex justify-end gap-1 items-end mt-2 h-4"><div className="music-bar"></div><div className="music-bar bar-2"></div><div className="music-bar bar-3"></div></div>}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'community' && (
                                        <div className="animate-in h-full flex flex-col">
                                            {!hasProfile ? (
                                                <div className="flex-1 flex flex-col items-center justify-center p-6 text-center py-20">
                                                    <div className="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mb-6 border border-blue-500/30">
                                                        <Icon name="user" className="w-10 h-10 text-blue-500" />
                                                    </div>
                                                    <h2 className="text-xl font-black uppercase italic mb-2 tracking-tighter">Crea tu Perfil</h2>
                                                    <p className="text-xs text-slate-400 mb-8 max-w-[220px]">Tu nombre y emojis serán permanentes en la comunidad EDK.</p>
                                                    
                                                    <div className="w-full space-y-4 max-w-[280px]">
                                                        <input 
                                                            type="text" 
                                                            placeholder="Nombre + Emojis 🚀" 
                                                            value={userName}
                                                            onChange={(e) => setUserName(e.target.value)}
                                                            className="w-full glass-input rounded-2xl p-4 text-center text-sm outline-none focus:ring-2 focus:ring-blue-500 text-white font-bold"
                                                        />
                                                        <button 
                                                            onClick={saveProfile}
                                                            className="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all"
                                                        >
                                                            Unirse al Chat
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col h-full animate-in">
                                                    <div className="flex items-center justify-between mb-6 px-2">
                                                        <div className="flex items-center gap-2">
                                                            <Icon name="message" className="w-5 h-5 text-blue-500" />
                                                            <h2 className="text-xl font-black italic uppercase tracking-tighter">Comunidad</h2>
                                                        </div>
                                                        <button onClick={() => {setHasProfile(false); localStorage.removeItem('edk_username')}} className="text-[8px] text-slate-500 font-bold uppercase border border-white/5 px-2 py-1 rounded-lg">Editar</button>
                                                    </div>

                                                    <div className="mb-6 glass-input p-4 rounded-[2.5rem] sticky top-0 z-10 shadow-2xl">
                                                        {replyingTo && (
                                                            <div className="flex justify-between items-center bg-blue-600/20 p-2 rounded-xl mb-2 text-[10px] font-bold">
                                                                <span className="px-2 truncate opacity-70 italic uppercase">Respondiendo...</span>
                                                                <button onClick={() => setReplyingTo(null)} className="text-red-400 px-2 uppercase text-[8px] font-black">Anular</button>
                                                            </div>
                                                        )}
                                                        <div className="flex gap-3">
                                                            <input 
                                                                type="text" 
                                                                value={newComment} 
                                                                onChange={(e) => setNewComment(e.target.value)}
                                                                placeholder="Escribe algo permanente..." 
                                                                className="flex-1 bg-transparent border-none text-xs outline-none font-medium"
                                                                onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                                            />
                                                            <button onClick={handleSend} className="bg-blue-600 p-3 rounded-xl shadow-lg active:scale-90"><Icon name="send" className="w-4 h-4 text-white" /></button>
                                                        </div>
                                                    </div>

                                                    <div className="space-y-4">
                                                        {comments.length === 0 && <p className="text-center py-10 text-[9px] text-slate-600 uppercase font-black tracking-widest italic">Iniciando base de datos...</p>}
                                                        {comments.map(comment => (
                                                            <div key={comment.id} className="animate-in">
                                                                <div className="comment-bubble p-4 rounded-[1.8rem] space-y-2 shadow-inner">
                                                                    <div className="flex justify-between items-center">
                                                                        <div className="flex items-center gap-2">
                                                                            <span className={`text-[10px] font-black uppercase ${comment.isOwner ? 'text-blue-400' : 'text-slate-400'}`}>{comment.user}</span>
                                                                            {comment.isOwner && <Icon name="checkCircle" className="w-3 h-3 text-blue-500" />}
                                                                        </div>
                                                                    </div>
                                                                    <p className="text-xs text-slate-200 leading-relaxed font-medium">{comment.text}</p>
                                                                    <button onClick={() => setReplyingTo(comment.id)} className="flex items-center gap-1.5 text-[9px] font-black text-blue-500 uppercase mt-2 hover:text-blue-300">
                                                                        <Icon name="reply" className="w-3 h-3" /> Responder
                                                                    </button>
                                                                </div>
                                                                {comment.replies && comment.replies.map((reply, rid) => (
                                                                    <div key={rid} className="ml-8 mt-2 comment-bubble p-3 rounded-[1.4rem] bg-slate-800/20 border-l-2 border-blue-600/40 shadow-sm">
                                                                        <span className="text-[9px] font-black text-slate-500 uppercase">{reply.user}</span>
                                                                        <p className="text-[11px] text-slate-300 font-medium leading-tight">{reply.text}</p>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {activeTab === 'owner' && (
                                        <div className="animate-in pt-4">
                                            <div className="bg-slate-800/40 p-10 rounded-[3.5rem] border border-white/5 text-center relative overflow-hidden shadow-2xl">
                                                <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-blue-600/20 to-transparent"></div>
                                                <div className="relative pt-6 mb-6">
                                                    <div className="w-32 h-32 bg-gradient-to-tr from-blue-600 via-blue-400 to-cyan-300 rounded-full p-1 mx-auto profile-glow">
                                                        <div className="w-full h-full bg-slate-900 rounded-full flex items-center justify-center border-4 border-slate-900 overflow-hidden relative">
                                                            <img src="OWNER.png" className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                                            <div className="hidden absolute inset-0 items-center justify-center text-white/50 bg-slate-800"><Icon name="user" className="w-14 h-14" /></div>
                                                        </div>
                                                    </div>
                                                    <div className="absolute bottom-1 right-1/2 translate-x-12 bg-blue-600 p-2.5 rounded-full border-4 border-slate-900 shadow-xl">
                                                        <Icon name="crown" className="w-5 h-5 text-white" />
                                                    </div>
                                                </div>
                                                <h2 className="text-3xl font-black italic uppercase tracking-tighter leading-none mb-1">MUNEEB_ALT</h2>
                                                <p className="text-blue-500 font-mono text-[9px] uppercase font-bold tracking-[0.4em] mb-10 italic uppercase leading-none">@ElDramaKing_ALT</p>
                                                <div className="bg-slate-950/60 p-6 rounded-[2.5rem] border border-white/5 text-left flex justify-between items-center group shadow-inner">
                                                    <div><p className="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1 italic leading-none">Estatus Global</p><p className="text-sm font-black text-blue-100 italic uppercase tracking-tighter">Founder & Owner</p></div>
                                                    <div className="w-10 h-10 bg-green-500/10 rounded-full flex items-center justify-center"><Icon name="checkCircle" className="w-6 h-6 text-green-500" /></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </main>

                        <nav className="absolute bottom-0 left-0 w-full h-24 bg-slate-900/95 backdrop-blur-2xl border-t border-white/5 px-4 flex justify-around items-center z-[100]">
                            <button onClick={() => {setActiveTab('home'); setShowQR(false)}} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === 'home' && !showQR ? 'text-blue-500 scale-110 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Icon name="home" className="w-6 h-6" /><span className="text-[8px] font-black uppercase italic tracking-tighter">Inicio</span>
                            </button>
                            <button onClick={() => {setActiveTab('youtube'); setShowQR(false)}} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === 'youtube' && !showQR ? 'text-red-500 scale-110 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Icon name="youtube" className="w-6 h-6" /><span className="text-[8px] font-black uppercase italic tracking-tighter">YouTube</span>
                            </button>
                            <div className="relative -top-6">
                                <button onClick={() => {setActiveTab('community'); setShowQR(false)}} className={`w-14 h-14 rounded-[1.8rem] flex items-center justify-center shadow-[0_10px_20px_rgba(37,99,235,0.4)] border-4 border-slate-900 transform active:scale-90 transition-all ${activeTab === 'community' ? 'bg-blue-600' : 'bg-slate-800'}`}>
                                    <Icon name="message" className="w-6 h-6 text-white" />
                                </button>
                            </div>
                            <button onClick={() => {setActiveTab('owner'); setShowQR(false)}} className={`flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === 'owner' && !showQR ? 'text-blue-500 scale-110 font-bold' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Icon name="user" className="w-6 h-6" /><span className="text-[8px] font-black uppercase italic tracking-tighter">Owner</span>
                            </button>
                        </nav>
                        <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/10 rounded-full"></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
